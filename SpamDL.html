<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spam Classifier (PNW Project)</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script src="index2.js" defer></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; padding: 40px; }
    .container { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .input-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px; color: #555; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { background: #2a4d69; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    button:hover { background: #1d3557; }
    #outputArea { margin-top: 20px; padding: 15px; text-align: center; border-radius: 8px; background: #f8f9fa; min-height: 50px; border: 1px solid #eee; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  </style>
</head>
<body>

  <div class="container">
    <h2 style="text-align:center; color:#2a4d69;">Spam Detection DL</h2>
    
    <div class="grid">
      <div class="input-group">
        <label>Word Count</label>
        <input id="num_words" type="number" value="0">
      </div>
      <div class="input-group">
        <label>Links Count</label>
        <input id="num_links" type="number" value="0">
      </div>
      <div class="input-group">
        <label>Exclamation Marks</label>
        <input id="exclamation_marks" type="number" value="0">
      </div>
      <div class="input-group">
        <label>Special Characters</label>
        <input id="special_chars" type="number" value="0">
      </div>
    </div>

    <button onclick="runModel()">Predict Category</button>
    <div id="outputArea">Ready for analysis...</div>
  </div>

</body>
</html>
